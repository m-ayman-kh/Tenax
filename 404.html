<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Tenax</title>
  <script>
    // GitHub Pages SPA routing fix.
    // Save the full URL to sessionStorage, then redirect to the app root.
    // index.html reads sessionStorage.redirect and restores the path via history.replaceState.
    sessionStorage.redirect = location.href;
    location.replace('/Tenax/');
  </script>
</head>
<body></body>
</html>
