<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 24px;
      padding: 40px 30px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    .icon {
      font-size: 60px;
      margin-bottom: 20px;
    }
    
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    
    p {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .password-input {
      position: relative;
      margin-bottom: 20px;
    }
    
    input {
      width: 100%;
      padding: 16px 20px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      letter-spacing: 4px;
      transition: all 0.3s;
    }
    
    input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .error {
      color: #f5576c;
      font-size: 14px;
      margin-bottom: 15px;
      min-height: 20px;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn:disabled {
      opacity: 0.6;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
      vertical-align: middle;
      margin-right: 8px;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">🔐</div>
    <h1>Welcome</h1>
    <p>Enter your password to access the building finance tracker</p>
    
    <div class="password-input">
      <input type="password" id="password" placeholder="••••••" autofocus>
    </div>
    
    <div class="error" id="error"></div>
    
    <button class="btn" id="submitBtn" onclick="login()">
      Login
    </button>
  </div>

  <script>
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') login();
    });
    
    function login() {
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submitBtn');
      const error = document.getElementById('error');
      
      if (!password) {
        error.textContent = 'Please enter password';
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Logging in...';
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=login&password=' + encodeURIComponent(password)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          // Store token in sessionStorage
          sessionStorage.setItem('token', result.token);
          sessionStorage.setItem('role', result.role);
          if (result.tenant) {
            sessionStorage.setItem('tenant', result.tenant);
          }
          // Redirect to SPA
          window.location.href = '<?= scriptUrl ?>?page=app';
        } else {
          error.textContent = result.error || 'Invalid password';
          btn.disabled = false;
          btn.innerHTML = 'Login';
        }
      })
      .catch(err => {
        error.textContent = 'Error: ' + err;
        btn.disabled = false;
        btn.innerHTML = 'Login';
      });
    }
  </script>
</body>
</html>
