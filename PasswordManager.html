<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 15px;
    }
    
    .container {
      max-width: 800px;
      margin: 0 auto;
    }
    
    .header {
      text-align: center;
      color: white;
      margin-bottom: 25px;
      padding-top: 10px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
    }
    
    .back-link {
      display: inline-block;
      color: rgba(255,255,255,0.9);
      text-decoration: none;
      margin-bottom: 15px;
      font-size: 14px;
    }
    
    /* Login Screen */
    .login-box {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 400px;
      margin: 50px auto;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    
    .login-box h2 {
      color: #333;
      margin-bottom: 10px;
    }
    
    .login-box p {
      color: #666;
      margin-bottom: 25px;
      font-size: 14px;
    }
    
    .password-input {
      width: 100%;
      padding: 16px;
      border: 2px solid #e0e0e0;
      border-radius: 12px;
      font-size: 18px;
      text-align: center;
      margin-bottom: 15px;
    }
    
    .password-input:focus {
      outline: none;
      border-color: #667eea;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn:disabled {
      opacity: 0.6;
    }
    
    .error {
      color: #f5576c;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
    
    /* Admin Panel */
    .admin-panel {
      display: none;
    }
    
    .section {
      background: white;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    
    .section h3 {
      color: #333;
      margin-bottom: 20px;
      font-size: 18px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .password-list {
      margin-bottom: 20px;
    }
    
    .password-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .password-text {
      font-family: monospace;
      font-size: 14px;
      color: #333;
    }
    
    .delete-btn {
      background: #ffebee;
      color: #c62828;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    
    .add-form {
      display: flex;
      gap: 10px;
      margin-top: 15px;
    }
    
    .add-form input {
      flex: 1;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .add-btn {
      background: #43e97b;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }
    
    .master-password-section {
      background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
    }
    
    .success-message {
      color: #43e97b;
      font-size: 14px;
      margin-top: 10px;
      min-height: 20px;
    }
    
    .loading {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s ease-in-out infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="<?= scriptUrl ?>" class="back-link">← Back to Home</a>
    
    <div class="header">
      <h1>🔐 Password Manager</h1>
      <p style="opacity: 0.9;">Manage access passwords securely</p>
    </div>
    
    <!-- Login Screen -->
    <div class="login-box" id="loginBox">
      <h2>Master Password Required</h2>
      <p>Enter the master password to manage all passwords</p>
      <input type="password" class="password-input" id="masterPassword" placeholder="••••••" onkeypress="if(event.key==='Enter')verifyMaster()">
      <button class="btn" id="loginBtn" onclick="verifyMaster()">Unlock</button>
      <div class="error" id="loginError"></div>
    </div>
    
    <!-- Admin Panel -->
    <div class="admin-panel" id="adminPanel">
      
      <!-- Editor Passwords -->
      <div class="section">
        <h3>👨‍💼 Editor Passwords (Expense/Revenue Access)</h3>
        <div class="password-list" id="editorList"></div>
        <div class="add-form">
          <input type="text" id="newEditorPassword" placeholder="New editor password">
          <button class="add-btn" onclick="addEditorPassword()">Add</button>
        </div>
        <div class="success-message" id="editorMessage"></div>
      </div>
      
      <!-- Viewer Passwords -->
      <div class="section">
        <h3>👥 Viewer Passwords (Dashboard Access)</h3>
        <div class="password-list" id="viewerList"></div>
        <div class="add-form">
          <input type="text" id="newViewerUnit" placeholder="Unit name (e.g., Unit 21)" style="flex: 0.4">
          <input type="text" id="newViewerPassword" placeholder="Password" style="flex: 0.6">
          <button class="add-btn" onclick="addViewerPassword()">Add</button>
        </div>
        <div class="success-message" id="viewerMessage"></div>
      </div>
      
      <!-- Change Master Password -->
      <div class="section master-password-section">
        <h3>🔑 Change Master Password</h3>
        <div style="display: flex; flex-direction: column; gap: 10px;">
          <input type="password" id="currentMaster" placeholder="Current master password" style="padding: 12px; border-radius: 8px; border: 2px solid #ddd;">
          <input type="password" id="newMaster" placeholder="New master password" style="padding: 12px; border-radius: 8px; border: 2px solid #ddd;">
          <button class="btn" onclick="changeMasterPassword()" style="margin-top: 10px;">Update Master Password</button>
        </div>
        <div class="success-message" id="masterMessage"></div>
      </div>
      
    </div>
  </div>

  <script>
    // Debug: Check if script loads
    console.log('PasswordManager loaded');
    
    function verifyMaster() {
      console.log('verifyMaster called');
      
      const password = document.getElementById('masterPassword').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('loginError');
      
      console.log('Password entered:', password);
      
      if (!password) {
        errorDiv.textContent = 'Please enter password';
        return;
      }
      
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span> Checking...';
      errorDiv.textContent = '';
      
      const scriptUrl = '<?= scriptUrl ?>';
      console.log('Fetching:', scriptUrl);
      
      fetch(scriptUrl, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=verifyMasterPassword&password=' + encodeURIComponent(password)
      })
      .then(response => {
        console.log('Response received:', response);
        return response.json();
      })
      .then(result => {
        console.log('Result:', result);
        
        if (result.success) {
          document.getElementById('loginBox').style.display = 'none';
          document.getElementById('adminPanel').style.display = 'block';
          renderEditorPasswords(result.editorPasswords);
          renderViewerPasswords(result.viewerPasswords);
        } else {
          errorDiv.textContent = result.error || 'Invalid password';
          btn.disabled = false;
          btn.textContent = 'Unlock';
        }
      })
      .catch(err => {
        console.error('Error:', err);
        errorDiv.textContent = 'Error: ' + err.message;
        btn.disabled = false;
        btn.textContent = 'Unlock';
      });
    }
    
    function renderEditorPasswords(passwords) {
      const container = document.getElementById('editorList');
      if (!passwords || passwords.length === 0) {
        container.innerHTML = '<p style="color: #999; font-size: 14px;">No editor passwords</p>';
        return;
      }
      
      container.innerHTML = passwords.map(pwd => 
        '<div class="password-item">' +
          '<span class="password-text">' + pwd + '</span>' +
          '<button class="delete-btn" onclick="removeEditorPassword(\'' + pwd + '\')">Remove</button>' +
        '</div>'
      ).join('');
    }
    
    function renderViewerPasswords(passwords) {
      const container = document.getElementById('viewerList');
      const entries = Object.entries(passwords || {});
      
      if (entries.length === 0) {
        container.innerHTML = '<p style="color: #999; font-size: 14px;">No viewer passwords</p>';
        return;
      }
      
      container.innerHTML = entries.map(([unit, pwd]) => 
        '<div class="password-item">' +
          '<span><strong>' + unit + ':</strong> <span class="password-text">' + pwd + '</span></span>' +
          '<button class="delete-btn" onclick="removeViewerPassword(\'' + unit + '\')">Remove</button>' +
        '</div>'
      ).join('');
    }
    
    function addEditorPassword() {
      const input = document.getElementById('newEditorPassword');
      const password = input.value.trim();
      
      if (!password) return;
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=addEditorPassword&password=' + encodeURIComponent(password)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          input.value = '';
          renderEditorPasswords(result.passwords);
          showMessage('editorMessage', 'Password added successfully');
        } else {
          showMessage('editorMessage', result.error, true);
        }
      });
    }
    
    function removeEditorPassword(password) {
      if (!confirm('Remove this editor password?')) return;
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=removeEditorPassword&password=' + encodeURIComponent(password)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          renderEditorPasswords(result.passwords);
          showMessage('editorMessage', 'Password removed');
        }
      });
    }
    
    function addViewerPassword() {
      const unitInput = document.getElementById('newViewerUnit');
      const pwdInput = document.getElementById('newViewerPassword');
      const unit = unitInput.value.trim();
      const password = pwdInput.value.trim();
      
      if (!unit || !password) {
        showMessage('viewerMessage', 'Unit and password required', true);
        return;
      }
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=addViewerPassword&unit=' + encodeURIComponent(unit) + '&password=' + encodeURIComponent(password)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          unitInput.value = '';
          pwdInput.value = '';
          renderViewerPasswords(result.passwords);
          showMessage('viewerMessage', 'Password added for ' + unit);
        } else {
          showMessage('viewerMessage', result.error, true);
        }
      });
    }
    
    function removeViewerPassword(unit) {
      if (!confirm('Remove password for ' + unit + '?')) return;
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=removeViewerPassword&unit=' + encodeURIComponent(unit)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          renderViewerPasswords(result.passwords);
          showMessage('viewerMessage', 'Password removed for ' + unit);
        }
      });
    }
    
    function changeMasterPassword() {
      const current = document.getElementById('currentMaster').value;
      const newPwd = document.getElementById('newMaster').value;
      
      if (!current || !newPwd) {
        showMessage('masterMessage', 'Both fields required', true);
        return;
      }
      
      fetch('<?= scriptUrl ?>', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/x-www-form-urlencoded',
        },
        body: 'action=changeMasterPassword&currentPassword=' + encodeURIComponent(current) + '&newPassword=' + encodeURIComponent(newPwd)
      })
      .then(response => response.json())
      .then(result => {
        if (result.success) {
          document.getElementById('currentMaster').value = '';
          document.getElementById('newMaster').value = '';
          showMessage('masterMessage', 'Master password changed! Please log in again.');
          setTimeout(() => {
            location.reload();
          }, 2000);
        } else {
          showMessage('masterMessage', result.error, true);
        }
      });
    }
    
    function showMessage(elementId, message, isError) {
      const el = document.getElementById(elementId);
      el.textContent = message;
      el.style.color = isError ? '#f5576c' : '#43e97b';
      setTimeout(() => {
        el.textContent = '';
      }, 3000);
    }
  </script>
</body>
</html>
