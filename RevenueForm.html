<style>
  .revenue-container {
    max-width: 600px;
    margin: 0 auto;
    padding: 15px;
  }
  
  .revenue-header {
    text-align: center;
    margin-bottom: 20px;
    padding-top: 10px;
  }
  
  .revenue-header h1 {
    color: #43e97b;
    font-size: 22px;
    margin-bottom: 5px;
  }
  
  .form-group {
    margin-bottom: 15px;
  }
  
  label {
    display: block;
    font-weight: 600;
    color: #333;
    margin-bottom: 6px;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  
  input, select, textarea {
    width: 100%;
    padding: 12px;
    border: 2px solid #e0e0e0;
    border-radius: 10px;
    font-size: 16px;
    transition: all 0.3s;
    background: #fafafa;
    -webkit-appearance: none;
  }
  
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #43e97b;
    background: white;
  }
  
  .tenant-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
    max-height: 200px;
    overflow-y: auto;
    padding: 5px;
  }
  
  @media (max-width: 400px) {
    .tenant-grid {
      grid-template-columns: repeat(3, 1fr);
    }
  }
  
  .tenant-btn {
    padding: 12px 4px;
    border: 2px solid #e0e0e0;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-size: 14px;
    font-weight: 600;
    transition: all 0.2s;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .tenant-btn.selected {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: white;
    border-color: #43e97b;
  }
  
  .tenant-btn:active {
    transform: scale(0.95);
  }
  
  .month-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    max-height: 250px;
    overflow-y: auto;
    padding: 5px;
  }
  
  @media (max-width: 400px) {
    .month-grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
  
  .month-btn {
    padding: 10px 6px;
    border: 2px solid #e0e0e0;
    background: white;
    border-radius: 8px;
    cursor: pointer;
    text-align: center;
    font-size: 12px;
    font-weight: 600;
    transition: all 0.2s;
    color: #666;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  
  .month-btn.selected {
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: white;
    border-color: #43e97b;
  }
  
  .month-btn:active {
    transform: scale(0.95);
  }
  
  .selection-summary {
    background: #f5f5f5;
    padding: 10px;
    border-radius: 8px;
    margin-top: 8px;
    font-size: 12px;
    color: #666;
  }
  
  .file-upload {
    border: 2px dashed #ddd;
    border-radius: 10px;
    padding: 20px;
    text-align: center;
    transition: all 0.3s;
    cursor: pointer;
    background: #fafafa;
  }
  
  .file-upload.active {
    border-color: #43e97b;
    background: #e8f5e9;
  }
  
  .file-upload input {
    display: none;
  }
  
  .file-list {
    margin-top: 10px;
    font-size: 12px;
    color: #666;
  }
  
  .file-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    background: #f5f5f5;
    border-radius: 6px;
    margin-bottom: 5px;
    font-size: 12px;
  }
  
  .remove-file {
    color: #f5576c;
    cursor: pointer;
    font-weight: bold;
    padding: 5px;
    font-size: 16px;
  }
  
  .submit-btn {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s;
    margin-top: 10px;
    min-height: 50px;
  }
  
  .submit-btn:active {
    transform: scale(0.98);
  }
  
  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }
  
  .success-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0,0,0,0.8);
    z-index: 1000;
    justify-content: center;
    align-items: center;
    padding: 20px;
  }
  
  .success-content {
    background: white;
    padding: 30px 25px;
    border-radius: 16px;
    text-align: center;
    animation: popIn 0.3s ease-out;
    max-width: 300px;
    width: 100%;
  }
  
  .success-icon {
    font-size: 50px;
    margin-bottom: 15px;
  }
  
  .success-content h2 {
    color: #43e97b;
    margin-bottom: 10px;
    font-size: 20px;
  }
  
  .success-content p {
    color: #666;
    font-size: 14px;
    margin-bottom: 20px;
  }
  
  .success-content button {
    width: 100%;
    padding: 12px;
    background: #43e97b;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    cursor: pointer;
  }
  
  @keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  
  .error-message {
    color: #f5576c;
    font-size: 12px;
    margin-top: 5px;
    display: none;
  }
  
  .loading {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
    margin-right: 8px;
    vertical-align: middle;
  }
  
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<div class="revenue-container">
  <div class="revenue-header">
    <h1>💰 Record Revenue</h1>
  </div>
  
  <form id="revenueForm">
    <input type="hidden" id="userPassword" value="<?= userPassword ?>">
    
    <div class="form-group">
      <label>Date of Entry *</label>
      <input type="date" id="date" required>
    </div>
    
    <div class="form-group">
      <label>Category *</label>
      <select id="category" required>
        <option value="">Select Category</option>
      </select>
    </div>
    
    <div class="form-group">
      <label>Tenant(s) * (Tap to select multiple)</label>
      <div class="tenant-grid" id="tenantGrid"></div>
      <div class="selection-summary" id="tenantSummary">0 tenants selected</div>
    </div>
    
    <div class="form-group">
      <label>Month(s) * (Tap to select multiple)</label>
      <div class="month-grid" id="monthGrid"></div>
      <div class="selection-summary" id="monthSummary">0 months selected</div>
    </div>
    
    <div class="form-group">
      <label>Amount *</label>
      <input type="number" id="amount" step="0.01" min="0.01" placeholder="0.00" required oninput="validateAmount(this)">
      <span class="error-message" id="amountError">Amount must be greater than 0</span>
      <div class="selection-summary" id="distributionSummary" style="display:none;"></div>
    </div>
    
    <div class="form-group">
      <label>Notes (Optional)</label>
      <textarea id="notes" rows="3" placeholder="Additional details..."></textarea>
    </div>
    
    <div class="form-group">
      <label>Attachments (Optional, Max 10 files, 10MB each)</label>
      <div class="file-upload" onclick="document.getElementById('attachments').click()" id="dropZone">
        <div style="font-size: 32px; margin-bottom: 8px;">📎</div>
        <div style="font-size: 14px;">Tap to upload files</div>
        <input type="file" id="attachments" multiple accept="image/*,.pdf,.doc,.docx" onchange="handleFiles(this.files)">
      </div>
      <div class="file-list" id="fileList"></div>
    </div>
    
    <button type="button" class="submit-btn" id="submitBtn" onclick="submitRevenueForm()">
      Submit Revenue
    </button>
  </form>
</div>

<div class="success-modal" id="successModal">
  <div class="success-content">
    <div class="success-icon">✅</div>
    <h2>Success!</h2>
    <p id="successMessage">Revenue recorded successfully</p>
    <button onclick="resetRevenueForm()">Record Another</button>
  </div>
</div>

<script>
  // Parse config from server-side template variable
  var CONFIG = JSON.parse('<?= configJson ?>');
  
  (function() {
    var today = new Date().toISOString().split('T')[0];
    document.getElementById('date').setAttribute('max', today);
    document.getElementById('date').value = today;
    
    // Populate categories
    var categorySelect = document.getElementById('category');
    var categories = CONFIG.REVENUE_CATEGORIES;
    
    for (var i = 0; i < categories.length; i++) {
      var option = document.createElement('option');
      option.value = categories[i];
      option.textContent = categories[i];
      categorySelect.appendChild(option);
    }
    
    // Populate tenants
    var tenantGrid = document.getElementById('tenantGrid');
    var totalTenants = CONFIG.TOTAL_TENANTS;
    
    for (var i = 1; i <= totalTenants; i++) {
      var btn = document.createElement('div');
      btn.className = 'tenant-btn';
      btn.dataset.tenant = i;
      btn.textContent = i;
      btn.onclick = function() { toggleTenant(this); };
      tenantGrid.appendChild(btn);
    }
    
    // Populate months
    var monthGrid = document.getElementById('monthGrid');
    var months = CONFIG.MONTHS;
    
    for (var i = 0; i < months.length; i++) {
      var month = months[i];
      var btn = document.createElement('div');
      btn.className = 'month-btn';
      btn.dataset.month = month;
      // Convert yy-mmm to mmm-yy for display
      var parts = month.split('-');
      btn.textContent = parts[1] + '-' + parts[0];
      btn.onclick = function() { toggleMonth(this); };
      monthGrid.appendChild(btn);
    }
    
    var selectedTenants = [];
    var selectedMonths = [];
    var selectedFiles = [];
    var MAX_FILES = CONFIG.MAX_ATTACHMENTS;
    var MAX_SIZE = CONFIG.MAX_FILE_SIZE_MB * 1024 * 1024;
    
    window.toggleTenant = function(element) {
      var tenant = element.dataset.tenant;
      
      if (element.classList.contains('selected')) {
        element.classList.remove('selected');
        selectedTenants = selectedTenants.filter(function(t) { return t !== tenant; });
      } else {
        element.classList.add('selected');
        selectedTenants.push(tenant);
      }
      
      document.getElementById('tenantSummary').textContent = selectedTenants.length + ' tenant(s) selected';
      updateDistributionSummary();
    };
    
    window.toggleMonth = function(element) {
      var month = element.dataset.month;
      
      if (element.classList.contains('selected')) {
        element.classList.remove('selected');
        selectedMonths = selectedMonths.filter(function(m) { return m !== month; });
      } else {
        element.classList.add('selected');
        selectedMonths.push(month);
      }
      
      document.getElementById('monthSummary').textContent = selectedMonths.length + ' month(s) selected';
      updateDistributionSummary();
    };
    
    window.validateAmount = function(input) {
      if (input.value < 0) {
        input.value = Math.abs(input.value);
      }
      
      var error = document.getElementById('amountError');
      if (input.value && parseFloat(input.value) <= 0) {
        error.style.display = 'block';
        input.style.borderColor = '#f5576c';
      } else {
        error.style.display = 'none';
        input.style.borderColor = '#e0e0e0';
      }
      
      updateDistributionSummary();
    };
    
    function updateDistributionSummary() {
      var amount = parseFloat(document.getElementById('amount').value) || 0;
      var tenants = selectedTenants.length;
      var months = selectedMonths.length;
      
      var summary = document.getElementById('distributionSummary');
      
      if (amount > 0 && tenants > 0 && months > 0) {
        var totalEntries = tenants * months;
        var perEntry = (amount / totalEntries).toFixed(2);
        summary.innerHTML = 'Will create <strong>' + totalEntries + '</strong> entries of <strong>EGP ' + perEntry + '</strong> each';
        summary.style.display = 'block';
      } else {
        summary.style.display = 'none';
      }
    }
    
    window.handleFiles = function(files) {
      Array.from(files).forEach(function(file) {
        if (selectedFiles.length >= MAX_FILES) {
          alert('Maximum ' + MAX_FILES + ' files allowed');
          return;
        }
        
        if (file.size > MAX_SIZE) {
          alert(file.name + ' is too large. Max size: ' + CONFIG.MAX_FILE_SIZE_MB + 'MB');
          return;
        }
        
        selectedFiles.push(file);
        renderFileList();
      });
    };
    
    function renderFileList() {
      var fileList = document.getElementById('fileList');
      fileList.innerHTML = '';
      
      selectedFiles.forEach(function(file, index) {
        var div = document.createElement('div');
        div.className = 'file-item';
        div.innerHTML = '<span>' + file.name + ' (' + (file.size/1024).toFixed(1) + ' KB)</span>' +
          '<span class="remove-file" onclick="removeFile(' + index + ')">×</span>';
        fileList.appendChild(div);
      });
    }
    
    window.removeFile = function(index) {
      selectedFiles.splice(index, 1);
      renderFileList();
    };
    
    var dropZone = document.getElementById('dropZone');
    
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('active');
    });
    
    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('active');
    });
    
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('active');
      window.handleFiles(e.dataTransfer.files);
    });
    
    window.submitRevenueForm = function() {
      var date = document.getElementById('date').value;
      if (!date) {
        alert('Please select a date');
        document.getElementById('date').focus();
        return;
      }
      
      var category = document.getElementById('category').value;
      if (!category) {
        alert('Please select a category');
        document.getElementById('category').focus();
        return;
      }
      
      if (selectedTenants.length === 0) {
        alert('Please select at least one tenant');
        return;
      }
      
      if (selectedMonths.length === 0) {
        alert('Please select at least one month');
        return;
      }
      
      var amount = parseFloat(document.getElementById('amount').value);
      if (!amount || amount <= 0) {
        document.getElementById('amountError').style.display = 'block';
        document.getElementById('amount').focus();
        return;
      }
      
      var btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="loading"></span>Processing...';
      
      var attachments = [];
      var pendingFiles = selectedFiles.length;
      
      if (pendingFiles === 0) {
        submitData(attachments);
        return;
      }
      
      selectedFiles.forEach(function(file) {
        var reader = new FileReader();
        reader.onloadend = function() {
          attachments.push({
            name: file.name,
            type: file.type,
            data: reader.result.split(',')[1]
          });
          pendingFiles--;
          if (pendingFiles === 0) {
            submitData(attachments);
          }
        };
        reader.onerror = function() {
          pendingFiles--;
          if (pendingFiles === 0) {
            submitData(attachments);
          }
        };
        reader.readAsDataURL(file);
      });
      
      function submitData(attachments) {
        var formData = {
          date: date,
          category: category,
          tenants: selectedTenants,
          months: selectedMonths,
          amount: amount,
          notes: document.getElementById('notes').value,
          attachments: attachments,
          userPassword: document.getElementById('userPassword').value
        };
        
        fetch(window.scriptUrl, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/x-www-form-urlencoded',
          },
          body: 'action=submitRevenue&data=' + encodeURIComponent(JSON.stringify(formData))
        })
        .then(function(response) { return response.json(); })
        .then(function(result) {
          if (result.success) {
            document.getElementById('successMessage').textContent = result.message;
            document.getElementById('successModal').style.display = 'flex';
          } else {
            alert('Error: ' + result.error);
            btn.disabled = false;
            btn.innerHTML = 'Submit Revenue';
          }
        })
        .catch(function(error) {
          alert('Error submitting: ' + error);
          btn.disabled = false;
          btn.innerHTML = 'Submit Revenue';
        });
      }
    };
    
    window.resetRevenueForm = function() {
      document.getElementById('revenueForm').reset();
      
      selectedTenants = [];
      var tenantBtns = document.querySelectorAll('.tenant-btn');
      for (var i = 0; i < tenantBtns.length; i++) {
        tenantBtns[i].classList.remove('selected');
      }
      document.getElementById('tenantSummary').textContent = '0 tenants selected';
      
      selectedMonths = [];
      var monthBtns = document.querySelectorAll('.month-btn');
      for (var i = 0; i < monthBtns.length; i++) {
        monthBtns[i].classList.remove('selected');
      }
      document.getElementById('monthSummary').textContent = '0 months selected';
      
      selectedFiles = [];
      renderFileList();
      
      document.getElementById('distributionSummary').style.display = 'none';
      
      document.getElementById('successModal').style.display = 'none';
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').innerHTML = 'Submit Revenue';
    };
  })();
</script>
